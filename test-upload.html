<!DOCTYPE html>
<html>
<head>
    <title>Teste Upload Firebase</title>
</head>
<body>
    <h1>Teste Upload Firebase Storage</h1>
    <input type="file" id="fileInput" />
    <button onclick="testUpload()">Testar Upload</button>
    <div id="result"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA8YGAReHeU9LZa64X-MUY5x4JxlbYy0-4",
            authDomain: "relatorios-app-93aee.firebaseapp.com",
            projectId: "relatorios-app-93aee",
            storageBucket: "relatorios-app-93aee.firebasestorage.app",
            messagingSenderId: "755495500516",
            appId: "1:755495500516:web:b4262cc77f975866d90af1",
            measurementId: "G-SFMZTLCCE1"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        window.testUpload = async function() {
            const fileInput = document.getElementById('fileInput');
            const result = document.getElementById('result');
            
            if (!fileInput.files[0]) {
                result.innerHTML = 'Selecione um arquivo primeiro';
                return;
            }

            const file = fileInput.files[0];
            result.innerHTML = 'Iniciando upload...';

            try {
                const testRef = ref(storage, `test/${Date.now()}_${file.name}`);
                console.log('Referência criada:', testRef.fullPath);
                
                const snapshot = await uploadBytes(testRef, file);
                console.log('Upload concluído:', snapshot.metadata);
                
                const url = await getDownloadURL(snapshot.ref);
                console.log('URL obtida:', url);
                
                result.innerHTML = `
                    <h3>✅ Upload bem-sucedido!</h3>
                    <p><strong>Arquivo:</strong> ${file.name}</p>
                    <p><strong>Tamanho:</strong> ${file.size} bytes</p>
                    <p><strong>URL:</strong> <a href="${url}" target="_blank">${url}</a></p>
                `;
            } catch (error) {
                console.error('Erro no upload:', error);
                result.innerHTML = `
                    <h3>❌ Erro no upload</h3>
                    <p><strong>Código:</strong> ${error.code}</p>
                    <p><strong>Mensagem:</strong> ${error.message}</p>
                `;
            }
        };
    </script>
</body>
</html>
